[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Allow custom CI workflow edits (Trusted Publisher/OIDC)
allow-dirty = ["ci"]
# Package repositories to publish installers to
publish-jobs = ["npm"]
# The installers to generate for each app
installers = ["npm"]
# The npm package name to publish/install
npm-package = "p2p-tunnel"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-linux-android", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
